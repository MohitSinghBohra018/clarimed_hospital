     <script>
    const reviews = [
        { name: "Mohit Kumar", initial: "M", stars: "★★★★★", text: "The medical care was beyond my expectations. The team was supportive and professional throughout." },
        { name: "Saurabh Singh", initial: "S", stars: "★★★★★", text: "Best diagnostic center in the city. Results were accurate and delivered on time. Thank you!" },
        { name: "Priya Sharma", initial: "P", stars: "★★★★☆", text: "Doctors are very experienced. The facility is clean and well-maintained. Highly recommended." }
    ];

    let current = 0;
    const dotContainer = document.getElementById('dot-container');

    // Create Navigation Dots
    reviews.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === 0 ? 'active' : ''}`;
        d.onclick = () => showReview(i);
        dotContainer.appendChild(d);
    });

    function showReview(index) {
        current = index;
        const card = document.getElementById('review-card');
        
        card.style.opacity = '0';
        card.style.transform = 'translateY(10px)';

        setTimeout(() => {
            const data = reviews[current];
            document.getElementById('stars-ui').innerText = data.stars;
            document.getElementById('text-ui').innerText = `"${data.text}"`;
            document.getElementById('name-ui').innerText = data.name;
            document.getElementById('avatar-ui').innerText = data.initial;

            // Update Dots
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === current);
            });

            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
        }, 300);
    }

    // Auto Slide every 5 seconds
    setInterval(() => {
        current = (current + 1) % reviews.length;
        showReview(current);
    }, 5000);
</script>
